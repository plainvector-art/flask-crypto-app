<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In-Memory File Vault</title>
    <!-- Tailwind CSS for high quality structural design styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between">

    <!-- Simple Navigation Header Bar -->
    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">
                    InMemoryVault
                </span>
            </div>
            <span class="text-xs bg-slate-800 text-slate-400 px-2 py-1 rounded-full font-mono border border-slate-700">
                AES-256 Bit Fernet
            </span>
        </div>
    </header>

    <!-- Core Dynamic Content Render Injector Section -->
    <main class="flex-grow flex items-center justify-center p-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Bottom Footer System Info Layout -->
    <footer class="border-t border-slate-800 text-center py-4 text-xs text-slate-500 font-mono">
        Secured Application Loop — System Never Writes Data To Server Disk.
    </footer>

</body>
</html>
